<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Transcript Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 560px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .logo svg {
      width: 40px;
      height: 40px;
    }

    .logo h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
    }

    .logo span {
      color: #ff4545;
    }

    label {
      display: block;
      font-size: 0.875rem;
      color: #aaa;
      margin-bottom: 0.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="url"] {
      flex: 1;
      background: #0f0f0f;
      border: 1px solid #444;
      border-radius: 8px;
      color: #f1f1f1;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      border-color: #ff4545;
    }

    button {
      background: #ff4545;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1.25rem;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { background: #e03333; }
    button:active { transform: scale(0.97); }

    button:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
    }

    .hint {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.6rem;
    }

    .flash {
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
    }

    .flash.error { background: #3a1414; border: 1px solid #7a2020; color: #ff8080; }
    .flash.success { background: #143a14; border: 1px solid #207a20; color: #80ff80; }

    .spinner {
      display: none;
      align-items: center;
      gap: 0.5rem;
      color: #aaa;
      font-size: 0.875rem;
      margin-top: 1rem;
    }

    .spinner.active { display: flex; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-icon {
      width: 16px; height: 16px;
      border: 2px solid #555;
      border-top-color: #ff4545;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="10" fill="#ff4545"/>
        <path d="M34 24L20 32V16L34 24Z" fill="white"/>
      </svg>
      <h1>Transcript<span>.</span>Download</h1>
    </div>

    <form id="form" method="POST" action="/">
      <label for="url">YouTube-URL</label>
      <div class="input-row">
        <input
          type="url"
          id="url"
          name="url"
          placeholder="https://www.youtube.com/watch?v=..."
          required
          autocomplete="off"
          spellcheck="false"
        />
        <button type="submit" id="btn">Download</button>
      </div>
      <p class="hint">Das Transcript wird als .txt-Datei heruntergeladen.</p>
    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <div class="spinner" id="spinner">
      <div class="spinner-icon"></div>
      Transcript wird geladen&hellip;
    </div>
  </div>

  <script>
    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    const spinner = document.getElementById("spinner");

    form.addEventListener("submit", () => {
      btn.disabled = true;
      btn.textContent = "Lädt…";
      spinner.classList.add("active");
    });
  </script>
</body>
</html>
